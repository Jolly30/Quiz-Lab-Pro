<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_v2.png?v=3" />
    <link rel="apple-touch-icon" href="/logo_v2.png?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Lab Pro</title>

    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme_pref');
          // If they saved dark mode (true), add the dark class
          if (savedTheme === 'true') {
            document.documentElement.classList.add('dark-mode');
          }
        } catch (e) {}
      })();
    </script>
    
    <style>
      /* --- LIGHT THEME (DEFAULT) --- */
      :root {
        --bg-color: #f8fafc; /* Slate 50 */
        --text-color: #0f172a; /* Slate 900 */
      }
      
      /* --- DARK THEME (IF SAVED) --- */
      html.dark-mode {
        --bg-color: #0B1120;
        --text-color: #ffffff;
      }

      body {
        margin: 0;
        background-color: var(--bg-color);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #3b82f6; /* Tailwind blue-500 */
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .title {
        color: var(--text-color);
        font-size: 20px;
        font-weight: 900;
        font-style: italic;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .subtitle {
        color: #3b82f6;
        font-size: 10px;
        font-weight: bold;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      @keyframes spin {
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-container">
        <div class="spinner"></div>
        <div class="title">Quiz Lab Pro</div>
        <div class="subtitle">Loading Workspace...</div>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
