<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <title>Quiz Lab Pro</title>

    <link rel="icon" type="image/png" href="/logo_v2.png?v=5" />
    <link rel="apple-touch-icon" href="/logo_v2.png?v=5" />

    <script>
      (function() {
        try {
          var isDark = localStorage.getItem('theme_pref');
          if (isDark === 'true' || (isDark === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <style>
      html, body, #root {
        background-color: #f8fafc; 
        margin: 0;
        padding: 0;
        height: 100%;
      }
      html.dark, html.dark body, html.dark #root {
        background-color: #0B1120;
      }
    </style>

    </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
