<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <title>Quiz Lab Pro</title>

    <link rel="icon" type="image/png" href="/logo_v2.png?v=5" />
    <link rel="apple-touch-icon" href="/logo_v2.png?v=5" />

    <script>
      (function() {
        try {
          var isDark = localStorage.getItem('theme_pref');
          var htmlEl = document.documentElement;
          if (isDark === 'true' || (isDark === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlEl.classList.add('dark');
            htmlEl.style.backgroundColor = '#0B1120';
          } else {
            htmlEl.style.backgroundColor = '#f8fafc';
          }
        } catch (e) {}
      })();
    </script>

    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
      .instant-splash { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
      .logo-box { width: 65vw; max-width: 320px; aspect-ratio: 16/9; }
      .powered-text { position: absolute; bottom: 3rem; font-family: sans-serif; font-size: 10px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.4; color: #0f172a; }
      html.dark .powered-text { color: #ffffff; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="instant-splash">
        <div class="logo-box">
          <svg style="width:100%; height:100%; image-rendering:-webkit-optimize-contrast; shape-rendering:geometricPrecision;" viewBox="60 205 400 115">
            <path fill="#4EC2DB" d="M63.9,227.8..."/> 
            </svg>
        </div>
        <p class="powered-text">Powered by Yadanar</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
